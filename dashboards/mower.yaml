# Starter dashboard for the Dreame A2 Mower integration.
#
# Copy this file to `<ha_config>/dashboards/mower/dashboard.yaml` (or
# wherever you prefer) and register it in `<ha_config>/lovelace.yaml`
# (or configuration.yaml):
#
#   lovelace-mower:
#     mode: yaml
#     title: Mower
#     icon: mdi:robot-mower
#     show_in_sidebar: true
#     filename: dashboards/mower/dashboard.yaml
#
# Entity IDs below reflect what a live g2408 install actually produces
# (as of alpha.109). A few nuances worth flagging:
#
# - `select.replay_session` is the pre-alpha.13 bare name. Fresh installs
#   from alpha.13+ get `select.dreame_a2_mower_replay_session`; rename
#   in Settings → Devices & Services → Entities if you want consistency,
#   OR edit the entity line below.
# - `sensor.archived_lidar_scans` and `sensor.archived_mowing_sessions`
#   are similarly bare — same note applies.
# - `sensor.dreame_a2_mower_mowing_trace_index` is disabled by default
#   (flips every s1p4 frame, floods the logbook). Enable it from the
#   device page if you want to see it on the dashboard.

title: Mower
views:
  - title: Mower
    path: mower
    icon: mdi:robot-mower
    cards:
      # ── Column 1: map + replay + 3D LiDAR ─────────────────────
      - type: vertical-stack
        cards:
          # 2D base map. picture-entity is used instead of
          # `custom:xiaomi-vacuum-map-card` because xiaomi-vacuum-map-card
          # crashes on this integration's calibration_points shape.
          - type: picture-entity
            entity: camera.dreame_a2_mower_map
            camera_image: camera.dreame_a2_mower_map
            show_state: false
            show_name: false

          # Session replay picker — controls what the Live map shows.
          #   Latest — follows the current (or most recent) run live.
          #   Blank  — empty canvas for screenshots.
          #   <date> — pins the map to one archived session.
          - type: entities
            title: Replay
            entities:
              - entity: select.replay_session
                name: Overlay session

          # Interactive 3D WebGL point-cloud viewer bundled with the
          # integration. Drag to orbit, wheel to zoom. Only populates
          # once the mower has uploaded a PCD (tap "Download LiDAR
          # map" in the Dreame app).
          - type: custom:dreame-a2-lidar-card
            point_size: 2.5

      # ── Column 2: control + session status + problems ─────────
      - type: vertical-stack
        cards:
          # Lawn-mower entity exposes Start / Pause / Dock / Return-to-base.
          # On g2408 these go through the siid=5 action path; alpha.105
          # added an siid=2 fallback on 80001 so they work on firmware
          # revisions where the upstream siid=5 path is unreachable.
          - type: tile
            entity: lawn_mower.dreame_a2_mower
            name: Dreame A2 Mower
            features:
              - type: lawn-mower-commands
                commands:
                  - start_pause
                  - dock

          # Manual session finalize — press after a mow that didn't
          # auto-close (firmware stuck in pending_resume, see TODO §B4
          # and the alpha.103 stale-session auto-recovery logic).
          - type: entities
            title: Session
            entities:
              - entity: sensor.dreame_a2_mower_state
              - entity: binary_sensor.dreame_a2_mower_mowing_session_active
              - entity: sensor.dreame_a2_mower_battery_level
              - entity: sensor.dreame_a2_mower_charging_status
              - entity: sensor.dreame_a2_mower_session_area_mowed
              - entity: sensor.dreame_a2_mower_session_distance
              - entity: button.dreame_a2_mower_finalize_session
                name: Finalize session (manual)

          - type: entities
            title: Problem indicators
            entities:
              - entity: binary_sensor.dreame_a2_mower_battery_temperature_low
              - entity: binary_sensor.dreame_a2_mower_positioning_failed
              - entity: binary_sensor.dreame_a2_mower_rain_protection_active
              - entity: binary_sensor.dreame_a2_mower_obstacle_detected

      # ── Column 3: live telemetry + maintenance point ──────────
      - type: vertical-stack
        cards:
          - type: entities
            title: Live telemetry
            entities:
              - entity: sensor.dreame_a2_mower_mowing_phase
                name: Mowing Zone
              - entity: sensor.dreame_a2_mower_mowing_position_x
              - entity: sensor.dreame_a2_mower_mowing_position_y
              - entity: sensor.dreame_a2_mower_heading_deg
              - entity: sensor.dreame_a2_mower_mowing_position_north_m
                name: Position North
              - entity: sensor.dreame_a2_mower_mowing_position_east_m
                name: Position East
              - entity: sensor.dreame_a2_mower_slam_activity

          - type: entities
            title: Dock
            entities:
              - entity: sensor.dreame_a2_mower_dock_x_cm
              - entity: sensor.dreame_a2_mower_dock_y_cm
              - entity: sensor.dreame_a2_mower_dock_yaw_deg
              - entity: sensor.dreame_a2_mower_dock_lawn_connected

          # Maintenance points — sensor state = count, attributes
          # carry the full list as [{id, x, y}, ...]. Markdown card
          # below renders them. "Go to" button sends the first point
          # by default; to target a specific point call the service
          # from Developer Tools with `point_id: N`.
          - type: entities
            title: Maintenance points
            entities:
              - entity: sensor.dreame_a2_mower_maintenance_points_count
                name: Points placed
          - type: markdown
            content: |
              {% set pts = state_attr('sensor.dreame_a2_mower_maintenance_points_count', 'points') or [] %}
              {% if pts %}
              | # | X (m) | Y (m) |
              | --- | --- | --- |
              {% for p in pts -%}
              | {{ p.id }} | {{ p.x }} | {{ p.y }} |
              {% endfor %}
              {% else %}
              _No maintenance points set. Add one in the Dreame app._
              {% endif %}
          - type: button
            name: Go to first maintenance point
            icon: mdi:map-marker-check
            tap_action:
              action: call-service
              service: dreame_a2_mower.mower_go_to_maintenance_point
              target:
                entity_id: lawn_mower.dreame_a2_mower

      # ── Column 4: settings, wear, stats, LiDAR ────────────────
      - type: vertical-stack
        cards:
          - type: entities
            title: Settings (from getCFG)
            entities:
              # mow_mode + mowing_height both read from s6p2 (FRAME_INFO)
              # — confirmed 2026-04-26. switch.mow_mode_efficient still
              # hidden (write path unknown).
              - entity: sensor.dreame_a2_mower_mow_mode
              - entity: sensor.dreame_a2_mower_mowing_height
              - entity: sensor.dreame_a2_mower_navigation_path
              - entity: sensor.dreame_a2_mower_frost_protection
              - entity: sensor.dreame_a2_mower_rain_protection
              - entity: sensor.dreame_a2_mower_low_speed_nighttime
              - entity: sensor.dreame_a2_mower_anti_theft
              - entity: sensor.dreame_a2_mower_auto_recharge_standby
              - entity: sensor.dreame_a2_mower_ai_obstacle_photos
              - entity: sensor.dreame_a2_mower_human_presence_alert
              - entity: sensor.dreame_a2_mower_child_lock_cfg
              - entity: sensor.dreame_a2_mower_robot_voice
              - entity: sensor.dreame_a2_mower_robot_voice_volume
              - entity: sensor.dreame_a2_mower_voice_prompt_modes
              - entity: sensor.dreame_a2_mower_charging_config
              - entity: sensor.dreame_a2_mower_weather_reference
              - entity: sensor.dreame_a2_mower_headlight_enabled
              - entity: sensor.dreame_a2_mower_headlight_schedule
              - entity: switch.dreame_a2_mower_dnd
                name: Do-Not-Disturb
              - entity: sensor.dreame_a2_mower_dnd_schedule
                name: DnD schedule
              - entity: sensor.dreame_a2_mower_mower_timezone

          - type: entities
            title: Wear / Consumables
            entities:
              - entity: sensor.dreame_a2_mower_blade_health_pct
              - entity: sensor.dreame_a2_mower_brush_health_pct
              - entity: sensor.dreame_a2_mower_robot_maintenance_health_pct
              - entity: sensor.dreame_a2_mower_aux_wear_health_pct

          # Lifetime totals from siid=12 (cleaning-history service,
          # re-added in alpha.102). If siid=12 doesn't respond on
          # your firmware the values remain Unavailable — safe to
          # leave in place regardless.
          - type: entities
            title: Statistics
            entities:
              - entity: sensor.dreame_a2_mower_first_mowing_date
              - entity: sensor.dreame_a2_mower_total_mowing_time
              - entity: sensor.dreame_a2_mower_mowing_count
              - entity: sensor.dreame_a2_mower_total_mowed_area

          - type: entities
            title: LiDAR
            entities:
              - entity: sensor.archived_lidar_scans
                name: Scans archived
              - entity: sensor.archived_mowing_sessions
                name: Sessions archived
              - entity: sensor.dreame_a2_mower_firmware_version
          - type: markdown
            content: >
              [Download latest .pcd](/api/dreame_a2_mower/lidar/latest.pcd)


              Opens in **CloudCompare**, **Open3D**, or **MeshLab** for
              full 3D inspection. Fresh scans are only downloaded when
              you tap *Download LiDAR map* in the Dreame app — see the
              README "Map & LiDAR freshness" section for why.
          - type: markdown
            title: CFG toggle-research view
            content: |
              {%- set ns = namespace(rows=[]) %}
              {%- set all_attrs = states.sensor.dreame_a2_mower_cfg_keys_raw.attributes if states.sensor.dreame_a2_mower_cfg_keys_raw else {} %}
              {%- set health = states.sensor.dreame_a2_mower_cfg_fetch_health %}
              {%- set health_state = health.state if health else 'unknown' %}
              {%- set health_attrs = health.attributes if health else {} %}
              {%- set fetched_at = health_attrs.get('cfg_fetched_at') %}
              {%- set changes = all_attrs.get('_recent_changes', {}) %}
              {%- set last_diff = all_attrs.get('_last_diff', {}) %}
              {%- set now_ts = as_timestamp(now()) %}
              {%- if fetched_at %}
                {%- set age = (now_ts - fetched_at) | round(0) | int %}
                {%- if age < 60 %}
                  {%- set fetch_label = age ~ 's ago' %}
                {%- elif age < 3600 %}
                  {%- set fetch_label = (age // 60) ~ 'm ' ~ (age % 60) ~ 's ago' %}
                {%- else %}
                  {%- set fetch_label = (age // 3600) ~ 'h ' ~ ((age % 3600) // 60) ~ 'm ago' %}
                {%- endif %}
              {%- else %}
                {%- set fetch_label = 'never' %}
              {%- endif %}
              {%- set emoji = {'ok':'🟢','backoff':'🟠','disabled':'🔴'}.get(health_state, '⚫') %}
              **{{ emoji }} Fetch health:** `{{ health_state }}` ·
              **last successful fetch:** {{ fetch_label }}
              {%- if health_attrs.get('consecutive_failures', 0) > 0 %}
               · **consecutive failures:** {{ health_attrs.consecutive_failures }}
               (retry in {{ health_attrs.get('next_retry_in_s', 0) }}s)
              {%- endif %}
              {%- if health_state == 'disabled' %}
               · **⚠ hard-disabled — reload integration to retry**
              {%- endif %}

              {%- if all_attrs %}
              {#- Keys whose semantic meaning is identified. Anything
                  outside this set gets a 🔴 marker so the unknown ones
                  stand out as toggle-research targets. -#}
              {%- set known_keys = ['AOP','ATA','BAT','CLS','CMS','DND','FDP','LANG','LIT','LOW','PROT','REC','STUN','TIME','VER','VOICE','VOL','WRF','WRP'] %}
              | Key | Value | Last changed |
              |---|---|---|
              {%- for k in all_attrs | sort %}
                {%- if not k.startswith('_') and k not in ('icon','friendly_name') %}
                  {%- set is_unknown = k not in known_keys %}
                  {%- set key_label = ('🔴 `' ~ k ~ '`') if is_unknown else ('`' ~ k ~ '`') %}
                  {%- set changed = changes.get(k) %}
                  {%- if changed %}
                    {%- set age = (now_ts - changed.changed_at) | round(0) | int %}
                    {%- if age < 60 %}
                      {%- set tag = '🔴 ' ~ age ~ 's ago' %}
                    {%- elif age < 300 %}
                      {%- set tag = '🟠 ' ~ (age // 60) ~ 'm ago' %}
                    {%- else %}
                      {%- set tag = (age // 60) ~ 'm ago' %}
                    {%- endif %}
                    {%- set ns.rows = ns.rows + ['| ' ~ key_label ~ ' | `' ~ all_attrs[k] ~ '` | ' ~ tag ~ ' (was `' ~ changed.old ~ '`) |'] %}
                  {%- else %}
                    {%- set ns.rows = ns.rows + ['| ' ~ key_label ~ ' | `' ~ all_attrs[k] ~ '` | — |'] %}
                  {%- endif %}
                {%- endif %}
              {%- endfor %}
              {{ ns.rows | join('\n') }}

              🔴 = unknown key — a candidate for toggle-correlation research.
              {%- else %}
              _Enable `sensor.dreame_a2_mower_cfg_keys_raw` from the device
              page (disabled-by-default diagnostic) to see CFG keys here._
              {%- endif %}
              {%- if last_diff %}

              **Last refresh diff** ({{ last_diff | length }} key(s)):
              {%- for k, v in last_diff.items() %}
              - `{{ k }}`: `{{ v.old }}` → `{{ v.new }}`
              {%- endfor %}
              {%- endif %}
